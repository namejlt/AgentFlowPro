services:
  postgres:
    image: postgres:16-alpine
    container_name: agentflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentflow_secret_2024}
      POSTGRES_DB: ${POSTGRES_DB:-agentflow}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentflow}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - agentflow-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentflow-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-AgentFlow Pro}
      HTTP_ADDR: ":28131"
      DATABASE_URL: "host=postgres user=${POSTGRES_USER:-agentflow} password=${POSTGRES_PASSWORD:-agentflow_secret_2024} dbname=${POSTGRES_DB:-agentflow} port=5432 sslmode=disable TimeZone=Asia/Shanghai"
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-64-char-string-in-production-xxxxx}
      JWT_EXPIRE: ${JWT_EXPIRE:-24h}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
      GIN_MODE: ${GIN_MODE:-release}
      ENGINE_MAX_WORKERS: ${ENGINE_MAX_WORKERS:-64}
      ENGINE_TASK_TIMEOUT: ${ENGINE_TASK_TIMEOUT:-30m}
      CHROME_BIN: /usr/bin/chromium-browser
    ports:
      - "${BACKEND_PORT:-28131}:28131"
    volumes:
      - uploads:/app/uploads
    networks:
      - agentflow-net

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: agentflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-28232}:80"
    networks:
      - agentflow-net

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  agentflow-net:
    driver: bridge
